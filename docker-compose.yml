version: "3.9"

services:
  zerodeploy:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: zerodeploy-app
    ports:
      - "${ZERO_DEPLOY_PORT:-8080}:8000"
    environment:
      - DOMAIN_SUFFIX=${DOMAIN_SUFFIX:-}
      - ENVIRONMENT=production
      - NODE_ENV=production
      - DOCKER_NETWORK=${DOCKER_NETWORK:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.zerodeploy.service=main"
      - "com.zerodeploy.version=1.0"

networks:
  default:
    driver: bridge

volumes:
  zerodeploy-pip-cache:
    driver: local